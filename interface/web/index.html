<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA - Your AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #07071a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header {
            width: 100%;
            padding: 18px 20px;
            text-align: center;
            background: linear-gradient(180deg, #12123a, #07071a);
            border-bottom: 1px solid #4f27a855;
        }

        .orb {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #a78bfa, #5b21b6, #1a1a3e);
            margin: 0 auto 10px;
            box-shadow: 0 0 25px #7c3aed99, 0 0 60px #7c3aed33;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 25px #7c3aed99, 0 0 60px #7c3aed33; }
            50% { box-shadow: 0 0 40px #a78bfacc, 0 0 90px #7c3aed55; }
        }

        .orb.talking {
            animation: talking 0.6s infinite;
        }

        @keyframes talking {
            0%, 100% { transform: scale(1); box-shadow: 0 0 25px #7c3aed99; }
            50% { transform: scale(1.15); box-shadow: 0 0 60px #a78bfadd; }
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
        }

        .header p {
            color: #7c5cba;
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-top: 4px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 12px 20px;
            width: 100%;
            max-width: 750px;
        }

        .tab {
            padding: 7px 22px;
            border-radius: 20px;
            border: 1px solid #4f27a8;
            background: transparent;
            color: #9170d8;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        .tab.active {
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            color: white;
            border-color: transparent;
        }

        .chat-container {
            width: 100%;
            max-width: 750px;
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scrollbar-width: thin;
            scrollbar-color: #4f27a8 transparent;
        }

        .history-container {
            width: 100%;
            max-width: 750px;
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 72%;
            line-height: 1.65;
            font-size: 0.92rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(135deg, #6d28d9, #4c1d95);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px #7c3aed33;
        }

        .aura-message {
            background: #13133a;
            border: 1px solid #4f27a844;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .aura-label {
            color: #9170d8;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 14px 18px;
            background: #13133a;
            border: 1px solid #4f27a844;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            width: fit-content;
        }

        .dot {
            width: 7px;
            height: 7px;
            background: #7c3aed;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-7px); opacity: 1; }
        }

        .input-container {
            width: 100%;
            max-width: 750px;
            padding: 12px 20px 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 13px 22px;
            background: #13133a;
            border: 1px solid #4f27a8;
            border-radius: 30px;
            color: #ffffff;
            font-size: 0.92rem;
            outline: none;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        input:focus {
            border-color: #9170d8;
            box-shadow: 0 0 20px #7c3aed22;
        }

        input::placeholder { color: #4f4f7a; }

        .send-btn {
            padding: 13px 28px;
            background: linear-gradient(135deg, #7c3aed, #5b21b6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 0.92rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px #7c3aed66;
        }

        .history-item {
            background: #13133a;
            border: 1px solid #4f27a833;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
        }

        .history-time { color: #4f4f7a; font-size: 0.72rem; margin-bottom: 6px; }
        .history-user { color: #a78bfa; margin-bottom: 4px; }
        .history-aura { color: #d1d5db; }

        .empty-history {
            color: #4f4f7a;
            text-align: center;
            margin-top: 40px;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; letter-spacing: 6px; }
            .message { max-width: 88%; }
            .send-btn { padding: 13px 18px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="orb" id="orb"></div>
        <h1>A U R A</h1>
        <p>AUTONOMOUS UNIVERSAL RESPONSIVE ASSISTANT</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('chat', this)">Chat</button>
        <button class="tab" onclick="showTab('history', this)">History</button>
    </div>

    <div class="chat-container" id="chat">
        <div class="message aura-message">
            <div class="aura-label">AURA</div>
            Hello! I am AURA, your personal AI assistant. How can I help you today?
        </div>
    </div>

    <div class="history-container" id="history"></div>

    <div class="input-container">
        <input
            type="text"
            id="userInput"
            placeholder="Ask AURA anything..."
            onkeypress="if(event.key==='Enter') sendMessage()"
        />
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>

    <script>
        function showTab(tab, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if (tab === 'chat') {
                document.getElementById('chat').style.display = 'flex';
                document.getElementById('history').style.display = 'none';
            } else {
                document.getElementById('chat').style.display = 'none';
                document.getElementById('history').style.display = 'flex';
                loadHistory();
            }
        }

        async function loadHistory() {
            const res = await fetch('/history');
            const data = await res.json();
            const container = document.getElementById('history');
            container.innerHTML = '';
            if (data.length === 0) {
                container.innerHTML = '<p class="empty-history">No chat history yet. Start a conversation!</p>';
                return;
            }
            data.reverse().forEach(item => {
                container.innerHTML += `
                    <div class="history-item">
                        <div class="history-time">${item.time}</div>
                        <div class="history-user">You: ${item.user}</div>
                        <div class="history-aura">AURA: ${item.aura}</div>
                    </div>`;
            });
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const text = input.value.trim();
            if (!text) return;

            chat.innerHTML += `<div class="message user-message">${text}</div>`;
            input.value = '';
            chat.innerHTML += `
                <div class="typing-indicator" id="typing">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>`;
            chat.scrollTop = chat.scrollHeight;
            document.getElementById('orb').classList.add('talking');

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();
            document.getElementById('typing').remove();
            document.getElementById('orb').classList.remove('talking');

            chat.innerHTML += `
                <div class="message aura-message">
                    <div class="aura-label">AURA</div>
                    ${data.response}
                </div>`;
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
